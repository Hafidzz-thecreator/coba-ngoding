<!DOCTYPE html><html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">  <!-- Font Shrikhand dari Google Fonts -->  <link href="https://fonts.googleapis.com/css2?family=Shrikhand&display=swap" rel="stylesheet">  <title>SURAT TERBUKA UNTUK FATHIMAH AZZAHRA</title>  <style>
    body {
      background: linear-gradient(to right, #ff9a9e, #fad0c4);
      font-family: 'Shrikhand', cursive;
      text-align: center;
      color: #fff;
      margin-top: 50px;
      padding: 10px;
    }

    h1 {
      font-size: 6vw;
      margin-bottom: 20px;
    }

    h2 {
      font-size: 5vw;
    }

    button {
      font-family: 'Shrikhand', cursive;
      background-color: #ff6f91;
      border: none;
      padding: 12px 20px;
      margin: 10px;
      font-size: 4.5vw;
      border-radius: 25px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background-color: #ff9671;
      transform: scale(1.1);
    }

    .heart {
      position: absolute;
      color: red;
      font-size: 6vw;
      animation: float 2s ease-in infinite;
    }

    @keyframes float {
      0% { transform: translateY(0); opacity: 1; }
      100% { transform: translateY(-200px); opacity: 0; }
    }
  </style></head><body>  <h1>💖 Saya Muhammad Hafidz, ingin mengisi kekosongan ❤️ Fathimah Azzahra 💖</h1><button onclick="jawaban('Yaiiyyyy😼😼')">Iyaaa Mauuuu😍😍</button>
<button onclick="jawaban('Haruss Mauu lahh Cantiqqq😤😤')">Gamauuu</button>

  <div id="result"></div>  <script>
    function jawaban(teks) {
      document.getElementById('result').innerHTML =
        "<h2>Apiss said: " + teks + " 💕</h2>";
      buatHati();
    }

    function buatHati() {
      let heart = document.createElement("div");
      heart.className = "heart";
      heart.innerHTML = "❤️";
      heart.style.left = Math.random() * window.innerWidth + "px";
      heart.style.top = window.innerHeight + "px";
      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 3000);
    }
  </script></body>
</html>
